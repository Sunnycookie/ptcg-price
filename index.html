<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTCG Price — 宝可梦卡牌价格聚合</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --bg2: #f2f0eb;
    --bg3: #e8e4dc;
    --text: #1a1714;
    --text2: #5a5550;
    --accent: #c0392b;       /* 锈红主色 */
    --accent2: #e8d5b0;      /* 暖金辅色 */
    --border: #d4cfc6;
    --card-bg: #fff;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', system-ui, sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid var(--text);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }
  .logo-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    background: var(--text);
    color: var(--bg);
    padding: 2px 8px;
    border-radius: 2px;
  }

  nav {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .nav-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 16px;
    border: 1.5px solid transparent;
    border-radius: 4px;
    background: none;
    color: var(--text2);
    cursor: pointer;
    transition: all 150ms var(--ease);
  }
  .nav-btn:hover { border-color: var(--border); color: var(--text); }
  .nav-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* ── Main Layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; }

  #panel-search { padding-top: 0; }
  .search-results-body { padding-top: 28px; }

  /* ── Japan Price Section ── */
  .jp-section {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 2px solid var(--text);
  }
  .jp-section h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .jp-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    background: #dc2626;
    color: #fff;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .jp-sub {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .jp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .jp-card {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    background: var(--card-bg);
    transition: border-color 150ms;
  }
  .jp-card:hover { border-color: var(--text); }
  .jp-card a { text-decoration: none; color: inherit; }
  .jp-card-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
    color: var(--text);
  }
  .jp-card-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .jp-card-price {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 16px;
    color: #dc2626;
  }
  .jp-card-stock {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .jp-card-stock.sold { color: #aaa; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .page-btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--card-bg);
    color: var(--text2);
    cursor: pointer;
    transition: all 150ms var(--ease);
  }
  .page-btn:hover { border-color: var(--text); color: var(--text); }
  .page-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    padding: 0 8px;
  }
  .page-size-inline {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    height: 36px;
    padding: 0 10px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--card-bg);
    color: var(--text2);
    cursor: pointer;
    margin-right: 8px;
  }

  /* ── Search Hero ── */
  .search-hero {
    position: sticky;
    top: 73px;   /* header 高度 */
    z-index: 90;
    background: var(--bg);
    padding: 16px 0 12px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
  }
  .search-hero-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
  }
  .search-hero h1 {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .search-hero h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .search-hero p {
    color: var(--text2);
    font-size: 13px;
    margin: 0;
  }

  .search-bar {
    display: flex;
    gap: 0;
    width: 100%;
    border: 2px solid var(--text);
    border-radius: 6px;
    overflow: hidden;
    background: var(--card-bg);
    transition: box-shadow 200ms var(--ease);
  }
  .search-bar:focus-within {
    box-shadow: 4px 4px 0 var(--text);
  }
  .search-bar input {
    flex: 1;
    padding: 12px 18px;
    font-family: var(--sans);
    font-size: 15px;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
  }
  .search-bar input::placeholder { color: var(--text2); opacity: 0.6; }

  .lang-select {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 0 14px;
    border: none;
    border-left: 2px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    cursor: pointer;
    outline: none;
  }

  .search-btn {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    padding: 14px 24px;
    border: none;
    border-left: 2px solid var(--text);
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
    transition: background 150ms;
  }
  .search-btn:hover { background: var(--accent); }

  .quick-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: var(--card-bg);
    color: var(--text2);
    cursor: pointer;
    transition: all 150ms;
  }
  .tag:hover { border-color: var(--text); color: var(--text); background: var(--accent2); }

  /* ── Tab Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Results Table ── */
  .results-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }
  .results-header h2 { font-size: 20px; font-weight: 700; }
  .results-count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    background: var(--bg2);
    padding: 2px 10px;
    border-radius: 2px;
  }

  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 0 auto;
  }
  thead tr { border-bottom: 2px solid var(--text); }
  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 100ms;
  }
  tbody tr:hover { background: var(--bg2); }
  td { padding: 12px 14px; vertical-align: middle; }

  .card-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }
  .card-name { font-weight: 600; }
  .card-set { color: var(--text2); font-size: 13px; }
  .rarity-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
    background: var(--bg2);
    color: var(--text2);
    white-space: nowrap;
  }
  .rarity-badge.rare { background: #fef3c7; color: #92400e; }
  .rarity-badge.ultra { background: #ede9fe; color: #5b21b6; }
  .rarity-badge.secret { background: #fce7f3; color: #9d174d; }
  .rarity-badge.sir { background: #fce7f3; color: #9d174d; font-weight: 700; }

  .price-cell { font-family: var(--mono); font-weight: 600; }
  .price-cell.high { color: var(--accent); }
  .price-cell.none { color: var(--border); }

  .btn-detail {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--text2);
    cursor: pointer;
    transition: all 150ms;
    white-space: nowrap;
  }
  .btn-detail:hover { border-color: var(--text); color: var(--text); background: var(--accent2); }

  /* ── Detail Panel ── */
  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 28px;
    padding: 6px 0;
    border: none;
    background: none;
    font-family: var(--sans);
  }
  .detail-back:hover { color: var(--text); }

  .detail-grid {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    align-items: start;
  }
  @media (max-width: 700px) {
    .detail-grid { grid-template-columns: 1fr; }
  }

  .card-img-wrap {
    position: relative;
  }
  .card-img-wrap img {
    width: 100%;
    border-radius: 12px;
    border: 2px solid var(--border);
    display: block;
    box-shadow: 6px 6px 0 var(--bg3);
    transition: transform 300ms var(--ease), box-shadow 300ms var(--ease);
  }
  .card-img-wrap img:hover {
    transform: translateY(-4px);
    box-shadow: 8px 12px 0 var(--bg3);
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 2.5/3.5;
    border-radius: 12px;
    border: 2px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 48px;
  }

  .detail-info {}
  .detail-name {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .detail-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .meta-chip {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1.5px solid var(--border);
    color: var(--text2);
  }

  .price-section { margin-bottom: 28px; }
  .price-section h3 {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .price-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .price-item {
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    transition: border-color 150ms, box-shadow 150ms;
  }
  .price-item:hover { border-color: var(--text); box-shadow: 3px 3px 0 var(--bg3); }
  .price-type {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .price-value {
    font-size: 22px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    letter-spacing: -1px;
  }
  .price-value.market { color: var(--accent); }
  .price-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
  }

  .buy-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    background: var(--text);
    color: var(--bg);
    border-radius: 4px;
    text-decoration: none;
    transition: background 150ms;
    margin-top: 4px;
  }
  .buy-link:hover { background: var(--accent); }

  /* ── Compare Panel ── */
  .compare-search {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    max-width: 480px;
  }
  .compare-search input {
    flex: 1;
    padding: 10px 16px;
    font-family: var(--sans);
    font-size: 15px;
    border: 2px solid var(--text);
    border-radius: 4px;
    outline: none;
    background: var(--card-bg);
  }
  .compare-search input:focus { box-shadow: 3px 3px 0 var(--bg3); }
  .compare-search button {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    border: 2px solid var(--text);
    border-radius: 4px;
    background: var(--text);
    color: var(--bg);
    cursor: pointer;
  }
  .compare-search button:hover { background: var(--accent); border-color: var(--accent); }

  /* ── Loading / Empty ── */
  .skeleton-row td {
    padding: 0 14px;
  }
  .skeleton {
    height: 20px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .empty-state {
    padding: 64px 0;
    text-align: center;
    color: var(--text2);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  .error-banner {
    padding: 14px 18px;
    border: 1.5px solid #fca5a5;
    background: #fff1f1;
    border-radius: 4px;
    color: #991b1b;
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    main { padding: 0 16px 60px; }
    .search-hero { top: 57px; padding: 12px 0 10px; }
    .search-hero h1 { font-size: 18px; letter-spacing: -0.5px; }
    .search-hero-title { flex-direction: column; gap: 2px; }
    .search-results-body { padding-top: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span>PTCG</span> Price
    <span class="logo-badge">价格聚合</span>
  </div>
  <nav>
    <button class="nav-btn active" onclick="switchTab('search')">🔍 搜索</button>
    <button class="nav-btn" onclick="switchTab('compare')">📊 比价</button>
  </nav>
</header>

<main>

  <!-- ── Search Panel ── -->
  <div id="panel-search" class="panel active">
    <div class="search-hero">
      <div class="search-hero-title">
        <h1>查询 <em>PTCG</em> 卡片价格</h1>
        <p>TCGPlayer · 日版平台 · 支持中文/日文/韩文/图鉴号</p>
      </div>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="支持中文/日文/英文/图鉴号，如 喷火龙 · #006" autocomplete="off">
        <button class="search-btn" onclick="doSearch()">搜索</button>
      </div>
      <div class="quick-tags">
        <span class="tag" onclick="quickSearch('charizard')">喷火龙</span>
        <span class="tag" onclick="quickSearch('pikachu')">皮卡丘</span>
        <span class="tag" onclick="quickSearch('mewtwo')">超梦</span>
        <span class="tag" onclick="quickSearch('umbreon')">月亮伊布</span>
        <span class="tag" onclick="quickSearch('rayquaza')">烈空坐</span>
        <span class="tag" onclick="quickSearch('lugia')">路基欧</span>
        <span class="tag" onclick="quickSearch('eevee')">伊布</span>
      </div>
    </div>
    <div class="search-results-body">
      <div id="search-results"></div>
    </div>
  </div>

  <!-- ── Compare Panel ── -->
  <div id="panel-compare" class="panel">
    <div class="results-header">
      <h2>跨版本比价</h2>
    </div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px;">
      输入宝可梦名称，对比该角色所有版本卡片的市场价格（按价格从高到低排列）
    </p>
    <div class="compare-search">
      <input id="compare-input" type="text" placeholder="例如 charizard" autocomplete="off"
             onkeydown="if(event.key==='Enter') doCompare()">
      <button onclick="doCompare()">比价</button>
    </div>
    <div id="compare-results"></div>
  </div>

  <!-- ── Detail Panel ── -->
  <div id="panel-detail" class="panel">
    <button class="detail-back" onclick="closeDetail()">← 返回结果</button>
    <div id="detail-content"></div>
  </div>

</main>

<script>
const API = 'https://api.pokemontcg.io/v2';
// API 地址
const YYT_API = (location.hostname === 'localhost' || location.hostname.startsWith('10.') || location.hostname.startsWith('192.168.'))
  ? `http://${location.hostname}:8766`
  : 'https://ptcg.cookiez.xyz/yyt';
let _prevPanel = 'search';
let _sortCol = 4, _sortDir = -1;   // 默认按市场价降序
let _lastSearchData = [];
let _lastQuery = '';
let _currentPage = 1;
let _totalCount = 0;
let _pageSize = 20;
let _nameMap = {};     // 中/日/韩 → 英文
let _enNames = [];     // 英文名列表（用于自动补全）
let _dexMap  = {};     // #006 / 6 → 英文名

// ── 加载名称对照表 ──
async function loadNameMap() {
  try {
    const r = await fetch('names.json');
    if (!r.ok) return;
    const data = await r.json();
    _nameMap = data.name_map || {};
    _enNames = data.en_names || [];
    _dexMap  = data.dex_map  || {};
    setupAutocomplete();
  } catch(e) {
    console.warn('names.json 加载失败，仅支持英文搜索', e);
  }
}

// ── 名称转换：中/日/韩/图鉴号 → 英文 ──
function toEnglishName(input) {
  const trimmed = input.trim();
  // 图鉴号格式：#006 / #25 / 纯数字（1~4位）
  if (/^#?\d{1,4}$/.test(trimmed)) {
    const num = trimmed.replace('#', '');
    // 尝试带前导零和不带前导零两种格式
    return _dexMap[`#${num}`]
        || _dexMap[`#${num.padStart(3,'0')}`]
        || _dexMap[num]
        || trimmed;
  }
  // 已经是英文（全ASCII），直接用
  if (/^[\x00-\x7F]+$/.test(trimmed)) return trimmed;
  // 查中/日/韩对照表
  return _nameMap[trimmed] || trimmed;
}

// ── 自动补全 ──
function setupAutocomplete() {
  const inputs = [
    { el: document.getElementById('search-input'), listId: 'search-datalist' },
    { el: document.getElementById('compare-input'), listId: 'compare-datalist' },
  ];
  inputs.forEach(({ el, listId }) => {
    if (!el) return;
    let dl = document.getElementById(listId);
    if (!dl) { dl = document.createElement('datalist'); dl.id = listId; document.body.appendChild(dl); }
    el.setAttribute('list', listId);
    el.addEventListener('input', () => {
      const val = el.value.trim();
      if (!val || val.length < 1) { dl.innerHTML = ''; return; }
      const isAscii = /^[\x00-\x7F]+$/.test(val);
      let matches = [];
      if (isAscii) {
        // 英文模糊匹配
        const lower = val.toLowerCase();
        matches = _enNames.filter(n => n.toLowerCase().startsWith(lower)).slice(0, 8);
      } else {
        // 非英文：查对照表中以 val 开头的键，最多8个
        matches = Object.entries(_nameMap)
          .filter(([k]) => k.startsWith(val))
          .map(([k, v]) => `${k} (${v})`)
          .slice(0, 8);
      }
      dl.innerHTML = matches.map(m => `<option value="${m}">`).join('');
    });
  });
}

// 英文名 → 日文名映射（用于遊々亭搜索）
function toJapaneseName(enName) {
  // 先查中文映射
  if (ZH_TO_JA[enName]) return ZH_TO_JA[enName];
  // 从 nameMap 反查英文→日文
  const lower = enName.toLowerCase();
  for (const [ja, en] of Object.entries(_nameMap)) {
    if (en.toLowerCase() === lower && /[\u3000-\u9fff]/.test(ja)) return ja;
  }
  return enName;
}

async function doSearch(page = 1) {
  const raw = document.getElementById('search-input').value.trim();
  if (!raw) return;
  const bracketMatch = raw.match(/\(([^)]+)\)$/);
  const q = bracketMatch ? bracketMatch[1].trim() : toEnglishName(raw);
  _currentPage = page;
  _lastQuery = q;
  const el = document.getElementById('search-results');
  el.innerHTML = renderSkeleton(5);

  // 日版搜索：中文→查映射表，日文→直接用，英文→从nameMap反查
  const jaName = toJapaneseName(/[\u4e00-\u9fa5]/.test(raw) ? raw : q);

  // 先请求美版，立刻渲染，不等日版
  const usData = await fetchJSON(`${API}/cards?q=name:"${encodeURIComponent(q)}"&pageSize=${_pageSize}&page=${page}&orderBy=set.releaseDate`).catch(() => ({data:[], totalCount:0}));

  _lastSearchData = usData.data || [];
  _totalCount = usData.totalCount || 0;
  _lastSearchData.sort((a, b) => (getBestPrice(b).market||0) - (getBestPrice(a).market||0));
  _sortCol = 4; _sortDir = -1;

  // 渲染美版结果
  el.innerHTML = renderSearchTable(_lastSearchData, _totalCount, q, page, _yytData);

  // 日版区：始终固定在搜索结果容器下方的独立区域
  let jpEl = document.getElementById('yyt-section');
  if (!jpEl) {
    jpEl = document.createElement('div');
    jpEl.id = 'yyt-section';
    el.parentNode.insertBefore(jpEl, el.nextSibling);
  }

  // 翻页时用缓存数据，第一页重新请求
  if (page === 1) {
    jpEl.innerHTML = `<div id="yyt-loading" style="padding:16px;color:var(--text2);text-align:center;">⏳ 正在加载日版价格…</div>`;
    fetchYYT(jaName).then(({ results, error }) => {
      _yytData = results;
      if (error) {
        jpEl.innerHTML = `
          <div style="margin:16px 0;padding:16px;background:var(--card);border-radius:12px;border:1px solid #f5c6c6;text-align:center;">
            <span style="font-size:20px;">⚠️</span>
            <p style="color:#e53935;margin:8px 0 4px;font-weight:600;">日版价格连接错误</p>
            <p style="color:var(--text2);font-size:13px;">请刷新页面重试</p>
          </div>`;
      } else if (results.length > 0) {
        jpEl.innerHTML = renderJPSection(results);
      } else {
        jpEl.innerHTML = `
          <div style="margin:16px 0;padding:16px;background:var(--card);border-radius:12px;border:1px solid var(--border);text-align:center;">
            <span style="font-size:20px;">🇯🇵</span>
            <p style="color:var(--text2);margin:8px 0 0;font-size:14px;">未查找到日版价格</p>
          </div>`;
      }

}

function renderSearchTable(cards, total, q, page = 1, yytData = []) {
  if (!cards.length && !yytData.length) return `<div class="empty-state"><div class="icon">🃏</div><p>未找到「${q}」相关卡片</p></div>`;
  if (!cards.length) return renderJPSection(yytData);
  const totalPages = Math.ceil(total / _pageSize);
  return `
    <div class="results-header">
      <h2>${q}</h2>
      <span class="results-count">共 ${total} 张 · 第 ${page}/${totalPages} 页</span>
    </div>
    <div class="table-wrap">
    <table id="search-table">
      <thead><tr>
        <th onclick="sortTable(0)">卡片ID</th>
        <th onclick="sortTable(1)">卡名</th>
        <th onclick="sortTable(6)">图鉴号</th>
        <th onclick="sortTable(2)">系列</th>
        <th onclick="sortTable(3)">稀有度</th>
        <th onclick="sortTable(4)" class="sort-desc">市场价 (USD)</th>
        <th onclick="sortTable(5)">低价 (USD)</th>
        <th></th>
      </tr></thead>
      <tbody>
        ${cards.map(c => renderSearchRow(c)).join('')}
      </tbody>
    </table>
    </div>
    ${renderPagination(page, totalPages)}`;
}

function renderPagination(current, total) {
  if (total < 1) return '';
  const pages = [];
  pages.push(1);
  for (let i = Math.max(2, current - 2); i <= Math.min(total - 1, current + 2); i++) pages.push(i);
  if (total > 1) pages.push(total);
  const uniq = [...new Set(pages)].sort((a, b) => a - b);

  let html = '<div class="pagination">';
  // 每页条数选择器放在左侧
  html += `<select class="page-size-inline" onchange="changePageSize(this.value)">
    <option value="20" ${_pageSize==20?'selected':''}>20条/页</option>
    <option value="50" ${_pageSize==50?'selected':''}>50条/页</option>
    <option value="100" ${_pageSize==100?'selected':''}>100条/页</option>
  </select>`;
  html += `<button class="page-btn" onclick="doSearch(${current-1})" ${current<=1?'disabled':''}>← 上页</button>`;
  let prev = 0;
  for (const p of uniq) {
    if (p - prev > 1) html += `<span class="page-info">…</span>`;
    html += `<button class="page-btn ${p===current?'active':''}" onclick="doSearch(${p})">${p}</button>`;
    prev = p;
  }
  html += `<button class="page-btn" onclick="doSearch(${current+1})" ${current>=total?'disabled':''}>下页 →</button>`;
  html += `<span class="page-info">${current}/${total} 页</span>`;
  html += '</div>';
  return html;
}

function changePageSize(val) {
  _pageSize = parseInt(val);
  doSearch(1);
}

function getBestPrice(card) {
  const types = ['holofoil','normal','reverseHolofoil','1stEditionHolofoil','unlimitedHolofoil'];
  let market = null, low = null;
  const tcg = card.tcgplayer;
  if (tcg && tcg.prices) {
    for (const t of types) {
      if (tcg.prices[t]) {
        const p = tcg.prices[t];
        if (p.market && (market === null || p.market > market)) market = p.market;
        if (p.low && (low === null || p.low < low)) low = p.low;
      }
    }
    // fallback: any key
    if (market === null) {
      for (const k of Object.keys(tcg.prices)) {
        const p = tcg.prices[k];
        if (p && p.market) market = p.market;
        if (p && p.low) low = p.low;
      }
    }
  }
  return { market, low };
}

function rarityClass(r) {
  if (!r) return '';
  const rl = r.toLowerCase();
  if (rl.includes('special illustration') || rl.includes('hyper')) return 'sir';
  if (rl.includes('ultra') || rl.includes('secret') || rl.includes('rainbow')) return 'ultra';
  if (rl.includes('rare')) return 'rare';
  return '';
}

function renderSearchRow(card) {
  const { market, low } = getBestPrice(card);
  const mStr = market !== null ? `$${market.toFixed(2)}` : '—';
  const lStr = low !== null ? `$${low.toFixed(2)}` : '—';
  const mClass = market !== null ? (market >= 50 ? 'price-cell high' : 'price-cell') : 'price-cell none';
  const dexNums = card.nationalPokedexNumbers;
  const dexStr = dexNums && dexNums.length ? dexNums.map(n => `#${String(n).padStart(3,'0')}`).join(' ') : '—';
  return `<tr>
    <td><span class="card-id">${card.id}</span></td>
    <td><span class="card-name">${card.name}</span></td>
    <td><span class="card-id">${dexStr}</span></td>
    <td><span class="card-set">${card.set?.name || '—'}</span></td>
    <td><span class="rarity-badge ${rarityClass(card.rarity)}">${card.rarity || '—'}</span></td>
    <td class="${mClass}">${mStr}</td>
    <td class="price-cell">${lStr}</td>
    <td><button class="btn-detail" onclick="loadDetail('${card.id}','search')">详情 →</button></td>
  </tr>`;
}

// ── Sort ──
function sortTable(col) {
  if (_sortCol === col) _sortDir *= -1;
  else { _sortCol = col; _sortDir = -1; }  // 切换新列默认降序
  const ths = document.querySelectorAll('#search-table thead th');
  ths.forEach((th, i) => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (i === col) th.classList.add(_sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  const sorted = [..._lastSearchData].sort((a, b) => {
    let va, vb;
    if (col === 0) { va = a.id; vb = b.id; }
    else if (col === 1) { va = a.name; vb = b.name; }
    else if (col === 2) { va = a.set?.name || ''; vb = b.set?.name || ''; }
    else if (col === 3) { va = a.rarity || ''; vb = b.rarity || ''; }
    else if (col === 4) { va = getBestPrice(a).market || -1; vb = getBestPrice(b).market || -1; return (va - vb) * _sortDir; }
    else if (col === 5) { va = getBestPrice(a).low || -1; vb = getBestPrice(b).low || -1; return (va - vb) * _sortDir; }
    else if (col === 6) { va = (a.nationalPokedexNumbers||[0])[0]||9999; vb = (b.nationalPokedexNumbers||[0])[0]||9999; return (va-vb)*_sortDir; }
    return va < vb ? -_sortDir : va > vb ? _sortDir : 0;
  });
  document.querySelector('#search-table tbody').innerHTML = sorted.map(c => renderSearchRow(c)).join('');
}

    tcgHtml = `<p style="color:var(--text2);font-size:14px;">该卡片暂无价格数据</p>`;
  }

  return `
    <div class="detail-grid">
      <div class="card-img-wrap">
        ${img
          ? `<img src="${img}" alt="${card.name}" loading="lazy">`
          : `<div class="card-img-placeholder">🃏</div>`}
      </div>
      <div class="detail-info">
        <div class="detail-name">${card.name}</div>
        <div class="detail-meta">
          <span class="meta-chip">${card.id}</span>
          <span class="meta-chip">${set.series || ''} · ${set.name || ''}</span>
          <span class="meta-chip">印刷编号 #${card.number || '?'}</span>
          ${card.nationalPokedexNumbers?.length ? `<span class="meta-chip">图鉴 ${card.nationalPokedexNumbers.map(n=>'#'+String(n).padStart(3,'0')).join(' ')}</span>` : ''}
          ${card.rarity ? `<span class="meta-chip rarity-badge ${rarityClass(card.rarity)}">${card.rarity}</span>` : ''}
          ${card.artist ? `<span class="meta-chip">画师：${card.artist}</span>` : ''}
          ${set.releaseDate ? `<span class="meta-chip">${set.releaseDate}</span>` : ''}
        </div>
        ${tcgHtml}
        ${cmHtml}
        <div id="detail-jp-price" style="margin-top:20px;">
          <div style="color:var(--text2);font-size:13px;">⏳ 正在加载日版价格…</div>
        </div>
      </div>
    </div>`;
}

// ── Compare ──
async function doCompare() {
  const raw = document.getElementById('compare-input').value.trim();
  if (!raw) return;
  const bracketMatch = raw.match(/\(([^)]+)\)$/);
  const q = bracketMatch ? bracketMatch[1].trim() : toEnglishName(raw);
  const el = document.getElementById('compare-results');
  el.innerHTML = renderSkeleton(8);
  try {
    const data = await fetchJSON(`${API}/cards?q=name:"${encodeURIComponent(q)}"&pageSize=50&orderBy=-set.releaseDate`);
    const cards = data.data || [];
    el.innerHTML = renderCompareTable(cards, data.totalCount, q);
  } catch(e) {
    el.innerHTML = `<div class="error-banner">❌ 请求失败：${e.message}</div>`;
  }
}

document.getElementById('compare-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCompare();
});

function renderCompareTable(cards, total, q) {
  if (!cards.length) return `<div class="empty-state"><div class="icon">🃏</div><p>未找到「${q}」</p></div>`;

  const rows = cards.map(c => {
    const { market, low } = getBestPrice(c);
    return { card: c, market: market || 0, low: low || 0 };
  }).sort((a, b) => b.market - a.market);

  return `
    <div class="results-header">
      <h2>${q} 全版本比价</h2>
      <span class="results-count">共 ${total} 张 · 显示 ${cards.length} 张</span>
    </div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>卡片ID</th><th>系列</th><th>稀有度</th>
        <th>市场价 (USD)</th><th>低价 (USD)</th><th></th>
      </tr></thead>
      <tbody>
        ${rows.map(({ card, market, low }) => `<tr>
          <td><span class="card-id">${card.id}</span></td>
          <td><span class="card-set">${card.set?.name || '—'}</span></td>
          <td><span class="rarity-badge ${rarityClass(card.rarity)}">${card.rarity || '—'}</span></td>
          <td class="${market >= 50 ? 'price-cell high' : market > 0 ? 'price-cell' : 'price-cell none'}">${market > 0 ? '$'+market.toFixed(2) : '—'}</td>
          <td class="price-cell">${low > 0 ? '$'+low.toFixed(2) : '—'}</td>
          <td><button class="btn-detail" onclick="loadDetail('${card.id}','compare')">详情 →</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

// ── Skeleton ──
function renderSkeleton(n) {
  return `<div class="table-wrap"><table><tbody>
    ${Array(n).fill(0).map(() => `<tr class="skeleton-row">
      ${Array(6).fill(0).map(() => `<td style="padding:16px 14px"><div class="skeleton" style="width:${60+Math.random()*40}%"></div></td>`).join('')}
    </tr>`).join('')}
  </tbody></table></div>`;
}
</script>

</body>
</html>
